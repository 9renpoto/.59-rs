name = "app"
main = "build/index.js"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/health", "/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "ddd-cloudflare-sample"
# Replace this value with the ID returned by `wrangler d1 create ddd-cloudflare-sample`
# before deploying. Wrangler uses this binding to create a local D1 database in development.
database_id = "00000000-0000-0000-0000-000000000000"
