version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    labels:
      - "Type: Maintenance"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "actions/checkout"
          - "actions/download-artifact"
          - "actions/stale"
      labeling:
        patterns:
          - "EndBug/export-label-config"
          - "EndBug/label-sync"
    labels:
      - "Type: Maintenance"
