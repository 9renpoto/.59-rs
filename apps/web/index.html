<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDD Cloudflare sample</title>
    <link data-trunk rel="rust" data-bin="web" />
    <style>
      :root { color: #172033; background: #f5f7fb; font-family: system-ui, sans-serif; }
      .page { display: grid; min-height: 100vh; place-items: center; padding: 2rem; }
      .card { width: min(100%, 32rem); padding: 2rem; border-radius: 1rem; background: white; box-shadow: 0 12px 36px #1720331a; }
      .eyebrow { color: #4f46e5; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
      form { display: grid; gap: .75rem; margin-top: 1.5rem; }
      input, button { border-radius: .5rem; font: inherit; padding: .75rem; }
      input { border: 1px solid #cbd5e1; }
      button { border: 0; background: #4f46e5; color: white; cursor: pointer; }
      .success { color: #047857; } .error { color: #b91c1c; }
    </style>
  </head>
  <body></body>
</html>
